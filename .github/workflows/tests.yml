name: tests

on:
  push:
    branches:
      - main
      - dev
      - feature/**
  pull_request:
    branches:
      - main
      - dev

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          python -m unittest discover -s tests -p 'test_*.py' 2>&1 | tee test-results.txt

      - name: Upload unit test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unittest-log
          path: test-results.txt
          if-no-files-found: warn

name: C2DTI_DAVIS_IRM_CF_CAUSAL_GATE
protocol: P1
output:
  base_dir: outputs
dataset:
  name: DAVIS
  path: data/davis
  allow_placeholder: true
model:
  # Main prediction model used for standard evaluation metrics.
  name: interaction_cross_attention
  latent_dim: 16
  epochs: 5
  lr: 0.01
  seed: 42
  attention_temperature: 1.0
  top_k: 8
split:
  strategy: random
  test_ratio: 0.2
  seed: 42
perturbation:
  strength: 0.10
  seed: 42
causal:
  enabled: true
  mode: irm_cf
  weight: 1.0
  # Pillar 4: IRM + Counterfactual config.
  irm_cf_config:
    # IRM: split drugs into n_envs groups and penalise variance of per-group MSE.
    n_envs: 4
    # Counterfactual: threshold above which a pair is considered a positive.
    pos_threshold: 0.5
    # Counterfactual: max number of positive pairs to create CF negatives from.
    n_cf_pairs: 1000
    # How much each component contributes to the combined irm_cf_score.
    irm_weight: 1.0
    cf_weight: 1.0
    seed: 42

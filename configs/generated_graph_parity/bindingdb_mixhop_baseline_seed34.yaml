name: C2DTI_BINDINGDB_MIXHOP_PARITY_S34
protocol: P1
output:
  base_dir: outputs
dataset:
  name: BindingDB
  path: data/bindingdb/bindingdb.csv
  allow_placeholder: true
model:
  name: mixhop_propagation
  latent_dim: 16
  epochs: 5
  lr: 0.01
  seed: 34
  top_k: 8
  hop_weights:
  - 0.6
  - 0.3
  - 0.1
split:
  strategy: random
  test_ratio: 0.2
  seed: 34

name: davis_binary_dual_emb
protocol: P_binary

dataset:
  name: DAVIS
  path: datasets/DAVIS_binary.csv
  allow_placeholder: false

model:
  name: dual_frozen_backbone
  fusion_alpha: 0.7
  seed: 42
  max_calibration_samples: 200000
  chemberta_npz_path: data/embeddings/DAVIS_chemberta_drug.npz
  ankh_npz_path: data/embeddings/DAVIS_ankh_target.npz

split:
  strategy: random
  test_ratio: 0.2
  seed: 42

binary:
  threshold: 0.5

output:
  base_dir: outputs_binary

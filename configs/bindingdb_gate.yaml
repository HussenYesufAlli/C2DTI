name: C2DTI_BINDINGDB_GATE
protocol: P1
output:
  base_dir: outputs
dataset:
  name: BindingDB
  path: data/bindingdb/bindingdb.csv
  allow_placeholder: true
model:
  name: matrix_factorization
  latent_dim: 16
  epochs: 5
  lr: 0.01
  seed: 42
split:
  strategy: random
  test_ratio: 0.2
  seed: 42

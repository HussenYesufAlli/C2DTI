name: kiba_regression_emb
protocol: P1

dataset:
  name: KIBA
  path: datasets/KIBA.csv
  allow_placeholder: false

model:
  name: dual_frozen_backbone
  drug_embedding_path: data/embeddings/KIBA_drug_emb.npz
  target_embedding_path: data/embeddings/KIBA_target_emb.npz

split:
  strategy: random
  test_ratio: 0.2
  seed: 42

output:
  base_dir: outputs
